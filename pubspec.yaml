name: waterborne_detection
description: Water-Borne Disease Early Detection Platform for Rural Northeast India

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Firebase Core ───────────────────────────────────────────
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3
  firebase_storage: ^13.1.0
  firebase_messaging: ^16.1.2

  # ── Google Maps ─────────────────────────────────────────────
  google_maps_flutter: ^2.5.3

  # ── State Management ────────────────────────────────────────
  flutter_riverpod: ^2.4.10
  riverpod_annotation: ^2.3.3

  # ── Offline Storage (Hive) ──────────────────────────────────
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # ── Image Handling ──────────────────────────────────────────
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1

  # ── Connectivity ────────────────────────────────────────────
  connectivity_plus: ^5.0.2

  # ── UI Utilities ────────────────────────────────────────────
  flutter_svg: ^2.0.9
  lottie: ^3.0.0
  shimmer: ^3.0.0
  fluttertoast: ^8.2.4
  intl: ^0.19.0
  uuid: ^4.3.3
  timeago: ^3.6.1
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # ── Location ─────────────────────────────────────────────────
  geolocator: ^11.0.0

  # ── Misc ─────────────────────────────────────────────────────
  path_provider: ^2.1.2
  shared_preferences: ^2.2.2
  equatable: ^2.0.5
  json_annotation: ^4.8.1
  collection: ^1.18.0
  flutter_local_notifications: ^19.4.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  # ── Code Generation ──────────────────────────────────────────
  hive_generator: ^2.0.1
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9
  json_serializable: ^6.7.1
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
